<!DOCTYPE html>
<html lang="en-GB">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Online Career Mode</title>
 <style>
  :root {
   --bg: #07111f;
   --bg-2: #0f172a;
   --panel: #101a2c;
   --line: rgba(255,255,255,0.08);
   --text: #e5edf8;
   --muted: #93a4bd;
   --accent: #38bdf8;
   --success: #22c55e;
   --warning: #f59e0b;
   --danger: #ef4444;
   --shadow: 0 22px 52px rgba(0,0,0,0.28);
   --radius: 20px;
  }

  * { box-sizing: border-box; }
  html, body {
   margin: 0;
   padding: 0;
   min-height: 100%;
   background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
   color: var(--text);
   font-family: Arial, Helvetica, sans-serif;
  }

  button, input, select, textarea { font: inherit; }
  .hidden { display: none !important; }

  .login-shell {
   min-height: 100vh;
   display: grid;
   place-items: center;
   padding: 24px;
  }

  .login-card {
   width: min(1100px, 100%);
   background: linear-gradient(180deg, rgba(23, 36, 56, 0.96), rgba(10, 17, 29, 0.98));
   border: 1px solid var(--line);
   border-radius: 28px;
   box-shadow: var(--shadow);
   overflow: hidden;
   display: grid;
   grid-template-columns: 1.1fr 0.9fr;
  }

  .login-hero, .login-form { padding: 32px; }

  .login-hero {
   background: radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 45%), rgba(255,255,255,0.02);
   border-right: 1px solid var(--line);
  }

  .login-badge, .badge {
   display: inline-flex;
   align-items: center;
   gap: 8px;
   padding: 7px 12px;
   border-radius: 999px;
   border: 1px solid rgba(56,189,248,0.3);
   background: rgba(56,189,248,0.12);
   color: #b6ebff;
   font-size: 0.82rem;
  }

  .login-title {
   margin: 18px 0 10px;
   font-size: clamp(2rem, 4vw, 3rem);
   line-height: 1.05;
  }

  .login-copy {
   color: var(--muted);
   line-height: 1.6;
   max-width: 52ch;
   margin-bottom: 24px;
  }

  .login-points {
   display: grid;
   gap: 12px;
   margin-top: 24px;
  }

  .login-point {
   padding: 14px 16px;
   border: 1px solid var(--line);
   border-radius: 16px;
   background: rgba(255,255,255,0.03);
  }

  .app-shell {
   display: grid;
   grid-template-columns: 280px 1fr;
   min-height: 100vh;
  }

  .sidebar {
   position: sticky;
   top: 0;
   height: 100vh;
   padding: 24px 18px;
   background: rgba(7, 17, 31, 0.92);
   border-right: 1px solid var(--line);
   backdrop-filter: blur(12px);
   overflow-y: auto;
  }

  .brand {
   font-size: 1.4rem;
   font-weight: 700;
   margin-bottom: 8px;
  }

  .brand small {
   display: block;
   color: var(--muted);
   font-size: 0.9rem;
   margin-top: 8px;
   line-height: 1.45;
  }

  .user-pill {
   margin-top: 16px;
   padding: 14px;
   border-radius: 16px;
   border: 1px solid var(--line);
   background: rgba(255,255,255,0.03);
  }

  .nav {
   display: grid;
   gap: 10px;
   margin-top: 22px;
  }

  .nav button {
   width: 100%;
   text-align: left;
   padding: 14px 16px;
   border-radius: 16px;
   border: 1px solid var(--line);
   background: rgba(255,255,255,0.03);
   color: var(--text);
   cursor: pointer;
   transition: 0.18s ease;
  }

  .nav button:hover,
  .nav button.active {
   border-color: rgba(56,189,248,0.36);
   background: rgba(56,189,248,0.14);
   transform: translateY(-1px);
  }

  .sidebar-box {
   margin-top: 22px;
   padding: 14px;
   border: 1px solid var(--line);
   border-radius: 16px;
   background: rgba(255,255,255,0.03);
  }

  .main {
   padding: 20px 24px 28px;
   min-width: 0;
  }

  .sticky-topbar {
   position: sticky;
   top: 0;
   z-index: 5;
   margin-bottom: 18px;
   padding: 16px 18px;
   border-radius: 20px;
   border: 1px solid var(--line);
   background: rgba(12, 22, 38, 0.92);
   backdrop-filter: blur(12px);
   display: flex;
   justify-content: space-between;
   gap: 16px;
   flex-wrap: wrap;
  }

  .identity-row {
   display: flex;
   gap: 14px;
   flex-wrap: wrap;
   align-items: center;
  }

  .identity-chip {
   padding: 10px 12px;
   border-radius: 14px;
   border: 1px solid var(--line);
   background: rgba(255,255,255,0.03);
   min-width: 120px;
  }

  .tab { display: none; }
  .tab.active { display: block; }

  .page-header {
   display: flex;
   justify-content: space-between;
   gap: 16px;
   align-items: flex-start;
   flex-wrap: wrap;
   margin-bottom: 18px;
  }

  .page-header h1,
  .page-header h2,
  .page-header h3 {
   margin: 0 0 8px;
  }

  .breadcrumbs {
   color: var(--muted);
   font-size: 0.92rem;
   margin-bottom: 10px;
  }

  .muted { color: var(--muted); }
  .small { font-size: 0.88rem; color: var(--muted); }

  .grid { display: grid; gap: 18px; }
  .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

  .hero {
   display: grid;
   grid-template-columns: 1.18fr 0.82fr;
   gap: 18px;
   margin-bottom: 18px;
  }

  .card {
   background: linear-gradient(180deg, rgba(23, 36, 56, 0.95), rgba(12, 20, 35, 0.98));
   border: 1px solid var(--line);
   border-radius: var(--radius);
   box-shadow: var(--shadow);
   padding: 18px;
  }

  .hero-club {
   display: flex;
   gap: 18px;
   align-items: center;
  }

  .club-logo {
   width: 104px;
   height: 104px;
   border-radius: 22px;
   border: 1px solid var(--line);
   background: rgba(255,255,255,0.04);
   display: grid;
   place-items: center;
   overflow: hidden;
   flex-shrink: 0;
  }

  .club-logo img {
   width: 100%;
   height: 100%;
   object-fit: cover;
  }

  .club-cell {
   display: flex;
   align-items: center;
   gap: 10px;
   min-width: 180px;
  }

  .table-logo {
   width: 28px;
   height: 28px;
   object-fit: contain;
   flex-shrink: 0;
  }

  .evidence-preview {
   margin-top: 12px;
   border: 1px solid var(--line);
   border-radius: 16px;
   overflow: hidden;
   background: rgba(255,255,255,0.03);
  }

  .evidence-preview img {
   display: block;
   width: 100%;
   max-height: 280px;
   object-fit: contain;
   background: rgba(0,0,0,0.2);
  }

  .club-logo span {
   font-size: 0.82rem;
   color: var(--muted);
   text-align: center;
   padding: 10px;
  }

  .hero-title {
   display: flex;
   gap: 10px;
   flex-wrap: wrap;
   align-items: center;
   margin-bottom: 10px;
  }

  .hero-title h1 {
   margin: 0;
   font-size: clamp(1.6rem, 3vw, 2.3rem);
  }

  .chip {
   display: inline-flex;
   align-items: center;
   gap: 8px;
   padding: 8px 12px;
   border-radius: 999px;
   border: 1px solid var(--line);
   background: rgba(255,255,255,0.04);
   font-size: 0.86rem;
  }

  .chip.success {
   color: #bbf7d0;
   background: rgba(34,197,94,0.14);
   border-color: rgba(34,197,94,0.28);
  }

  .chip.warning {
   color: #fde68a;
   background: rgba(245,158,11,0.14);
   border-color: rgba(245,158,11,0.28);
  }

  .chip.danger {
   color: #fecaca;
   background: rgba(239,68,68,0.14);
   border-color: rgba(239,68,68,0.28);
  }

  .card-row {
   display: flex;
   justify-content: space-between;
   gap: 12px;
   flex-wrap: wrap;
   align-items: center;
  }

  .stat-blocks {
   display: grid;
   gap: 12px;
   grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .stat-box {
   border: 1px solid var(--line);
   border-radius: 16px;
   padding: 14px;
   background: rgba(255,255,255,0.03);
  }

  .stat-box .label {
   display: block;
   font-size: 0.82rem;
   color: var(--muted);
   margin-bottom: 8px;
  }

  .stat-box strong { font-size: 1.35rem; }

  .list {
   display: grid;
   gap: 12px;
  }

  .list-item {
   border: 1px solid var(--line);
   border-radius: 16px;
   padding: 14px;
   background: rgba(255,255,255,0.03);
  }

  .empty {
   border: 1px dashed rgba(255,255,255,0.15);
   border-radius: 16px;
   padding: 20px;
   color: var(--muted);
   text-align: center;
   background: rgba(255,255,255,0.02);
  }

  table {
   width: 100%;
   border-collapse: collapse;
  }

  th, td {
   padding: 12px 10px;
   border-bottom: 1px solid var(--line);
   text-align: left;
   font-size: 0.95rem;
   vertical-align: top;
  }

  th {
   color: var(--muted);
   font-weight: 600;
   background: rgba(255,255,255,0.03);
  }

  .table-wrap {
   overflow-x: auto;
   border-radius: 16px;
   border: 1px solid var(--line);
  }

  .actions {
   display: flex;
   gap: 10px;
   flex-wrap: wrap;
  }

  .btn {
   border: 1px solid var(--line);
   border-radius: 14px;
   padding: 12px 16px;
   cursor: pointer;
   background: rgba(255,255,255,0.04);
   color: var(--text);
   transition: 0.18s ease;
  }

  .btn.primary {
   background: linear-gradient(180deg, rgba(56,189,248,0.24), rgba(56,189,248,0.14));
   border-color: rgba(56,189,248,0.4);
  }

  .btn.success {
   background: linear-gradient(180deg, rgba(34,197,94,0.24), rgba(34,197,94,0.14));
   border-color: rgba(34,197,94,0.38);
  }

  .btn.warning {
   background: linear-gradient(180deg, rgba(245,158,11,0.24), rgba(245,158,11,0.14));
   border-color: rgba(245,158,11,0.38);
  }

  .btn.danger {
   background: linear-gradient(180deg, rgba(239,68,68,0.24), rgba(239,68,68,0.14));
   border-color: rgba(239,68,68,0.38);
  }

  .pill {
   display: inline-flex;
   padding: 5px 10px;
   border-radius: 999px;
   font-size: 0.8rem;
   border: 1px solid var(--line);
   background: rgba(255,255,255,0.04);
  }

  .pill.pending {
   color: #fde68a;
   background: rgba(245,158,11,0.14);
   border-color: rgba(245,158,11,0.26);
  }

  .pill.approved {
   color: #bbf7d0;
   background: rgba(34,197,94,0.14);
   border-color: rgba(34,197,94,0.26);
  }

  .pill.rejected {
   color: #fecaca;
   background: rgba(239,68,68,0.14);
   border-color: rgba(239,68,68,0.26);
  }

  .toast-wrap {
   position: fixed;
   right: 18px;
   bottom: 18px;
   z-index: 50;
   display: grid;
   gap: 12px;
   width: min(420px, calc(100vw - 36px));
  }

  .toast {
   padding: 14px 16px;
   border-radius: 16px;
   border: 1px solid var(--line);
   background: rgba(10, 18, 30, 0.96);
   box-shadow: var(--shadow);
  }

  .event-grid {
   display: grid;
   gap: 12px;
  }

  .event-row {
   display: grid;
   grid-template-columns: 1fr 1fr;
   gap: 12px;
   padding: 12px;
   border-radius: 14px;
   border: 1px solid var(--line);
   background: rgba(255,255,255,0.03);
  }

  .section-divider {
   margin: 24px 0 16px;
   padding-top: 16px;
   border-top: 1px solid var(--line);
  }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  input[type="url"],
  select,
  textarea {
   width: 100%;
   background: rgba(255,255,255,0.04);
   color: var(--text);
   border: 1px solid var(--line);
   border-radius: 14px;
   padding: 12px 14px;
   outline: none;
  }

  textarea {
   min-height: 110px;
   resize: vertical;
  }

  label {
   display: block;
   font-size: 0.9rem;
   color: var(--muted);
   margin-bottom: 8px;
  }

  .form-grid {
   display: grid;
   gap: 16px;
   grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  @media (max-width: 980px) {
   .login-card { grid-template-columns: 1fr; }
   .login-hero { border-right: none; border-bottom: 1px solid var(--line); }
   .app-shell { grid-template-columns: 1fr; }
   .sidebar {
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--line);
   }
  }

  @media (max-width: 760px) {
   .main { padding: 16px; }
   .hero, .grid-4, .grid-3, .grid-2, .stat-blocks, .form-grid, .event-row {
    grid-template-columns: 1fr;
   }
   .sticky-topbar { position: relative; }
   .hero-club { flex-direction: column; align-items: flex-start; }
  }
 </style>
</head>

  "submittedByUserId": null,
  "approvedByUserId": null,
  "notes": "",
  "evidenceImage": "",
  "events": [],
  "audit": []
 },
 {
  "id": 90,
  "round": 18,
  "date": "2026-05-09",
  "homeClubId": 20,
  "awayClubId": 14,
  "homeGoals": "",
  "awayGoals": "",
  "status": "scheduled",
  "submittedByUserId": null,
  "approvedByUserId": null,
  "notes": "",
  "evidenceImage": "",
  "events": [],
  "audit": []
 }
]
 </script>

 <script>
  const STORAGE_KEY = "eafc_manager_mode_embedded_v1";

  const defaultUiState = {
   currentUserId: null,
   currentTab: "meu-clube",
   selectedMatchId: null
  };

  let state = {
   league: { name: "", season: "" },
   currentUserId: null,
   currentTab: "meu-clube",
   selectedMatchId: null,
   users: [],
   clubs: [],
   players: [],
   matches: []
  };

  function loadEmbeddedJSON(scriptId, fallbackValue = null) {
   const el = document.getElementById(scriptId);
   if (!el) return fallbackValue;

   const raw = el.textContent.trim();
   if (!raw) return fallbackValue;

   try {
    return JSON.parse(raw);
   } catch (error) {
    console.warn(`Falha ao ler o bloco JSON ${scriptId}.`, error);
    return fallbackValue;
   }
  }

  async function init() {
   try {
    const appDate = loadEmbeddedJSON("app-data-json", { league: { name: "", season: "" }, users: [] });
    const clubsDate = loadEmbeddedJSON("clubs-json", []);
    const playersDate = loadEmbeddedJSON("players-json", []);
    const matchesDate = loadEmbeddedJSON("matches-json", []);

    const savedUi = loadUiState();
    const snapshot = loadLocalSnapshot();

    state = normalizeState({
     league: appDate?.league || { name: "", season: "" },
     currentUserId: savedUi.currentUserId,
     currentTab: savedUi.currentTab || "meu-clube",
     selectedMatchId: savedUi.selectedMatchId || null,
     users: Array.isArray(appDate?.users) ? appDate.users : [],
     clubs: Array.isArray(clubsDate) ? clubsDate : [],
     players: Array.isArray(playersDate) ? playersDate : [],
     matches: mergeMatches(Array.isArray(matchesDate) ? matchesDate : [], snapshot?.matches || [])
    });

    render();
   } catch (error) {
    document.body.innerHTML = `
     <div style="padding:40px;max-width:900px;margin:0 auto;">
      <h1>Erro ao carregar os dados embutidos</h1>
      <p>Confirma se os blocos JSON foram colados correctamente dentro do HTML.</p>
      <pre>${escapeHtml(String(error))}</pre>
     </div>
    `;
   }
  }

  function loadUiState() {
   const raw = localStorage.getItem(STORAGE_KEY);
   if (!raw) return structuredClone(defaultUiState);
   try {
    return { ...structuredClone(defaultUiState), ...JSON.parse(raw) };
   } catch {
    return structuredClone(defaultUiState);
   }
  }

  function saveUiState() {
   localStorage.setItem(STORAGE_KEY, JSON.stringify({
    currentUserId: state.currentUserId,
    currentTab: state.currentTab,
    selectedMatchId: state.selectedMatchId
   }));
  }

  function loadLocalSnapshot() {
   const raw = localStorage.getItem("eafc_manager_mode_embedded_snapshot");
   if (!raw) return null;
   try {
    return JSON.parse(raw);
   } catch {
    return null;
   }
  }

  function mergeMatches(baseMatches, snapshotMatches) {
   if (!Array.isArray(snapshotMatches) || !snapshotMatches.length) return baseMatches;
   const snapshotById = new Map(snapshotMatches.map(match => [match.id, match]));
   return baseMatches.map(match => snapshotById.get(match.id) || match);
  }

  function normalizeState(inputState) {
   const clone = structuredClone(inputState);

   clone.clubs = (clone.clubs || []).map(club => ({
    ...club,
    squad: normalizeSquad(club.squad || [])
   }));

   clone.matches = (clone.matches || []).map(match => ({
    ...match,
    events: Array.isArray(match.events) ? match.events : [],
    audit: Array.isArray(match.audit) ? match.audit : [],
    evidenceImage: match?.evidenceImage || ""
   }));

   return clone;
  }

  function normalizeSquad(squad) {
   return squad.map(player => {
    if (typeof player === "string") return { id: null, name: player };
    return {
     id: player?.id ?? null,
     name: player?.name ?? ""
    };
   }).filter(player => player.name);
  }

  function saveAllToLocalSnapshot() {
   localStorage.setItem("eafc_manager_mode_embedded_snapshot", JSON.stringify({
    matches: state.matches
   }));
  }

  function escapeHtml(value) {
   return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
  }

  function toast(message, type = "success") {
   const wrap = document.getElementById("toastWrap");
   const el = document.createElement("div");
   el.className = `toast ${type}`;
   el.innerHTML = `<strong>${type === "success" ? "Success" : type === "warning" ? "Warning" : "Attention"}</strong><div class="small" style="margin-top:6px;color:var(--text);">${escapeHtml(message)}</div>`;
   wrap.appendChild(el);
   setTimeout(() => el.remove(), 3200);
  }

  function isAdmin() {
   const user = getCurrentUser();
   return user?.role === "admin";
  }

  function nowStamp() {
   const d = new Date();
   const pad = n => String(n).padStart(2, "0");
   return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  const ROUND_RELEASE_START = new Date(2026, 2, 15);

  function startOfLocalDay(date) {
   return new Date(date.getFullYear(), date.getMonth(), date.getDate());
  }

  function getUnlockedRoundCount() {
   const today = startOfLocalDay(new Date());
   const anchor = startOfLocalDay(ROUND_RELEASE_START);
   const diffDays = Math.floor((today - anchor) / 86400000);
   const weeksPassed = diffDays < 0 ? 0 : Math.floor(diffDays / 7);
   return Math.min(18, 3 + (weeksPassed * 3));
  }

  function isMatchUnlocked(match) {
   return Number(match?.round || 0) <= getUnlockedRoundCount();
  }

  function getNextReleaseDate() {
   const unlocked = getUnlockedRoundCount();
   if (unlocked >= 18) return null;
   const weeksPassed = Math.floor((unlocked - 3) / 3);
   const next = new Date(ROUND_RELEASE_START);
   next.setDate(next.getDate() + ((weeksPassed + 1) * 7));
   return next;
  }

  function formatReleaseDate(date) {
   if (!date) return 'All rounds are now open.';
   return date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function getCurrentUser() {
   return state.users.find(user => user.id === state.currentUserId) || null;
  }

  function getClubById(id) {
   return state.clubs.find(club => club.id === id) || null;
  }

  function getMatchById(id) {
   return state.matches.find(match => match.id === id) || null;
  }

  function getCurrentClub() {
   const user = getCurrentUser();
   if (!user || !user.clubId) return null;
   return getClubById(user.clubId);
  }

  function getSquadList(clubId) {
   return getClubById(clubId)?.squad || [];
  }

  function getClubLogoUrl(club) {
   if (!club) return "";
   if (club.logoUrl) return club.logoUrl;
   const fallbackMap = {
    "Arsenal": "https://cdn.sofifa.net/meta/team/19/240.png",
    "Aston Villa": "https://cdn.sofifa.net/meta/team/2/240.png",
    "Liverpool": "https://cdn.sofifa.net/meta/team/8/240.png",
    "Manchester City": "https://cdn.sofifa.net/meta/team/10/240.png"
   };
   return fallbackMap[club.name] || "";
  }

  function renderClubCell(clubName, logoUrl) {
   const logo = logoUrl ? `<img class="table-logo" src="${escapeHtml(logoUrl)}" alt="${escapeHtml(clubName)}" />` : "";
   return `<div class="club-cell">${logo}<span>${escapeHtml(clubName)}</span></div>`;
  }


  function sortText(a, b) {
   return String(a ?? "").localeCompare(String(b ?? ""), "pt-BR", { sensitivity: "base" });
  }

  function getSortedSquadList(clubId) {
   return [...getSquadList(clubId)].sort((a, b) => sortText(a.name, b.name));
  }

  function renderEvidencePreview(match) {
   if (!match?.evidenceImage) return "";
   return `
    <div class="evidence-preview">
     <img src="${match.evidenceImage}" alt="Match evidence" />
    </div>
   `;
  }

  function formatMatchLabel(match) {
   const home = getClubById(match.homeClubId);
   const away = getClubById(match.awayClubId);
   return `${home?.name || "?"} v ${away?.name || "?"}`;
  }

  function getApprovedMatches() {
   return state.matches.filter(match => match.status === "approved");
  }

  function getClubApprovedMatches(clubId) {
   return getApprovedMatches().filter(match => match.homeClubId === clubId || match.awayClubId === clubId);
  }

  function getClubAllMatches(clubId) {
   return state.matches.filter(match => match.homeClubId === clubId || match.awayClubId === clubId);
  }

  function getClubPendingMatches(clubId) {
   return state.matches.filter(match => match.status === "pending" && (match.homeClubId === clubId || match.awayClubId === clubId));
  }

  function getClubScheduledMatches(clubId) {
   return state.matches.filter(match => match.status === "scheduled" && (match.homeClubId === clubId || match.awayClubId === clubId));
  }

  function getClubNextMatch(clubId) {
   return getClubScheduledMatches(clubId).sort((a, b) => String(a.date).localeCompare(String(b.date)))[0] || null;
  }

  function getClubForm(clubId, limit = 5) {
   const matches = getClubApprovedMatches(clubId)
    .sort((a, b) => String(b.date).localeCompare(String(a.date)))
    .slice(0, limit);

   return matches.map(match => {
    const isHome = match.homeClubId === clubId;
    const gf = isHome ? Number(match.homeGoals) : Number(match.awayGoals);
    const ga = isHome ? Number(match.awayGoals) : Number(match.homeGoals);
    if (gf > ga) return "V";
    if (gf < ga) return "D";
    return "E";
   });
  }

  function getClubStatsFromMatches(clubId) {
   const approvedMatches = getClubApprovedMatches(clubId);
   let played = 0, wins = 0, draws = 0, losses = 0, gf = 0, ga = 0;

   approvedMatches.forEach(match => {
    const isHome = match.homeClubId === clubId;
    const goalsFor = isHome ? Number(match.homeGoals) : Number(match.awayGoals);
    const goalsAgainst = isHome ? Number(match.awayGoals) : Number(match.homeGoals);

    played += 1;
    gf += goalsFor;
    ga += goalsAgainst;

    if (goalsFor > goalsAgainst) wins += 1;
    else if (goalsFor < goalsAgainst) losses += 1;
    else draws += 1;
   });

   return {
    played, wins, draws, losses, gf, ga,
    gd: gf - ga,
    points: wins * 3 + draws
   };
  }

  function buildLeagueTable() {
   const rows = state.clubs.map(club => ({
    clubId: club.id,
    clubName: club.name,
    shortName: club.shortName,
    ...getClubStatsFromMatches(club.id)
   }));

   rows.sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return a.clubName.localeCompare(b.clubName);
   });

   return rows.map((row, index) => ({ ...row, position: index + 1 }));
  }

  function getReducedTableForClub(clubId) {
   const table = buildLeagueTable();
   const index = table.findIndex(row => row.clubId === clubId);
   if (index === -1) return [];
   return table.slice(Math.max(0, index - 1), Math.min(table.length, index + 2));
  }

  function getClubNarrative(clubId) {
   const table = buildLeagueTable();
   const row = table.find(item => item.clubId === clubId);
   if (!row) return "There are no approved fixtures yet to shape the season story.";

   const above = table[row.position - 2];
   const below = table[row.position];
   let text = `${row.clubName} are in ${row.position} place with ${row.points} points.`;
   if (above) text += ` They are ${above.points - row.points} point(s) ${above.clubName}.`;
   if (below) text += ` They are ${row.points - below.points} point(s) vantagem sobre ${below.clubName}.`;
   return text;
  }


  function getClubPlayerStats(clubId) {
   const squad = getSortedSquadList(clubId);
   const map = new Map();

   squad.forEach(player => {
    map.set(player.name, {
     id: player.id,
     name: player.name,
     goals: 0,
     assists: 0,
     yellow: 0,
     red: 0
    });
   });

   getClubApprovedMatches(clubId).forEach(match => {
    match.events.forEach(event => {
     const isClubEvent = (event.teamSide === "home" && match.homeClubId === clubId) || (event.teamSide === "away" && match.awayClubId === clubId);
     if (!isClubEvent) return;

     if (event.player && map.has(event.player)) {
      if (event.type === "goal") map.get(event.player).goals += 1;
      if (event.type === "yellow") map.get(event.player).yellow += 1;
      if (event.type === "red") map.get(event.player).red += 1;
     }

     if (event.type === "goal" && event.assist && event.assist !== "No assist" && map.has(event.assist)) {
      map.get(event.assist).assists += 1;
     }
    });
   });

   return [...map.values()].sort((a, b) => sortText(a.name, b.name));
  }

  function getTopScorer(clubId) {
   return getClubPlayerStats(clubId)[0] || null;
  }

  function getTopAssist(clubId) {
   return [...getClubPlayerStats(clubId)].sort((a, b) => {
    if (b.assists !== a.assists) return b.assists - a.assists;
    if (b.goals !== a.goals) return b.goals - a.goals;
    return a.name.localeCompare(b.name);
   })[0] || null;
  }

  function getMostBooked(clubId) {
   return [...getClubPlayerStats(clubId)].sort((a, b) => {
    const totalA = a.yellow + a.red * 2;
    const totalB = b.yellow + b.red * 2;
    if (totalB !== totalA) return totalB - totalA;
    return a.name.localeCompare(b.name);
   })[0] || null;
  }



  function getAllPlayerStats() {
   const map = new Map();

   state.clubs.forEach(club => {
    getSortedSquadList(club.id).forEach(player => {
     const key = `${club.id}::${player.name}`;
     map.set(key, {
      clubId: club.id,
      clubName: club.name,
      playerName: player.name,
      goals: 0,
      assists: 0,
      yellow: 0,
      red: 0
     });
    });
   });

   getApprovedMatches().forEach(match => {
    match.events.forEach(event => {
     const clubId = event.teamSide === "home" ? match.homeClubId : match.awayClubId;
     const key = `${clubId}::${event.player}`;
     if (event.player && map.has(key)) {
      if (event.type === "goal") map.get(key).goals += 1;
      if (event.type === "yellow") map.get(key).yellow += 1;
      if (event.type === "red") map.get(key).red += 1;
     }

     if (event.type === "goal" && event.assist && event.assist !== "No assist") {
      const assistKey = `${clubId}::${event.assist}`;
      if (map.has(assistKey)) map.get(assistKey).assists += 1;
     }
    });
   });

   return [...map.values()];
  }

  function getLeagueTopScorers(limit = 10) {
   return getAllPlayerStats()
    .filter(player => player.goals > 0)
    .sort((a, b) => {
     if (b.goals !== a.goals) return b.goals - a.goals;
     if (b.assists !== a.assists) return b.assists - a.assists;
     return sortText(a.playerName, b.playerName);
    })
    .slice(0, limit);
  }

  function getLeagueMostBooked(limit = 10) {
   return getAllPlayerStats()
    .filter(player => player.yellow > 0 || player.red > 0)
    .sort((a, b) => {
     const totalA = a.yellow + a.red * 2;
     const totalB = b.yellow + b.red * 2;
     if (totalB !== totalA) return totalB - totalA;
     if (b.red !== a.red) return b.red - a.red;
     return sortText(a.playerName, b.playerName);
    })
    .slice(0, limit);
  }

  function getMatchesGroupedByRound() {
   const grouped = new Map();

   [...state.matches]
    .sort((a, b) => {
     if (Number(a.round) !== Number(b.round)) return Number(a.round) - Number(b.round);
     return sortText(a.date, b.date);
    })
    .forEach(match => {
     const roundKey = Number(match.round) || 0;
     if (!grouped.has(roundKey)) grouped.set(roundKey, []);
     grouped.get(roundKey).push(match);
    });

   return [...grouped.entries()].map(([round, matches]) => ({ round, matches }));
  }

  function getPendingApprovalsForUser() {
   const user = getCurrentUser();
   if (!user) return [];

   return state.matches.filter(match => {
    if (match.status !== "pending") return false;
    if (user.role === "admin") return true;
    if (!user.clubId) return false;

    const involved = match.homeClubId === user.clubId || match.awayClubId === user.clubId;
    if (!involved) return false;

    return match.submittedByUserId !== user.id;
   });
  }

  function canSubmitMatch(homeClubId, awayClubId) {
   const user = getCurrentUser();
   if (!user) return false;
   if (user.role === "admin") return true;
   if (!user.clubId) return false;
   return user.clubId === homeClubId || user.clubId === awayClubId;
  }

  function canApproveMatch(match) {
   const user = getCurrentUser();
   if (!user) return false;
   if (user.role === "admin") return true;
   if (!user.clubId) return false;

   const involved = match.homeClubId === user.clubId || match.awayClubId === user.clubId;
   if (!involved) return false;
   return match.submittedByUserId !== user.id && match.status === "pending";
  }

  function switchTab(tab) {
   state.currentTab = tab;
   saveUiState();
   render();
  }

  function login(userId) {
   state.currentUserId = Number(userId);
   state.currentTab = "meu-clube";
   saveUiState();
   render();
   toast(`Signed in as ${getCurrentUser().name}.`);
  }

  function logout() {
   state.currentUserId = null;
   saveUiState();
   render();
   toast("Signed out.", "warning");
  }

  function openMatch(matchId) {
   state.selectedMatchId = Number(matchId);
   state.currentTab = "partidas";
   saveUiState();
   render();
  }

  function render() {
   if (!state.currentUserId) renderLogin();
   else renderApp();
  }

  function renderLogin() {
   const loginShell = document.getElementById("loginShell");
   const appShell = document.getElementById("appShell");

   appShell.classList.add("hidden");
   loginShell.classList.remove("hidden");

   loginShell.innerHTML = `
    <div class="login-card">
     <div class="login-hero">
      <span class="login-badge">Career control centre</span>
      <h1 class="login-title">Manager Mode EAFC</h1>
      <p class="login-copy">
       EAFC is only for playing the fixtures and capturing the evidence. Everything else is managed here:
       club overview, fixture planning, results, approvals, league table, statistics and match history.
      </p>

      <div class="login-points">
       <div class="login-point">
        <strong>User-based view</strong>
        <div class="small">Each manager signs in directly to their own club dashboard.</div>
       </div>
       <div class="login-point">
        <strong>Centralised squad data</strong>
        <div class="small">Goals, assists and cards are pulled straight from the club squad list.</div>
       </div>
       <div class="login-point">
        <strong>Separate permissions</strong>
        <div class="small">The administrator has full oversight. Managers only see and edit what is relevant to them.</div>
       </div>
      </div>
     </div>

     <div class="login-form">
      <h2>Sign in to the system</h2>
      <p class="muted">Choose a profile to simulate sign-in.</p>

      <div style="margin-top:20px;">
       <label for="loginUserSelect">User</label>
       <select id="loginUserSelect">
        ${state.users.map(user => {
         const club = user.clubId ? getClubById(user.clubId) : null;
         const extra = club ? ` — ${club.name}` : " — General administration";
         return `<option value="${user.id}">${escapeHtml(user.name)} (${user.role})${escapeHtml(extra)}</option>`;
        }).join("")}
       </select>
      </div>

      <div class="actions" style="margin-top:16px;">
       <button class="btn primary" id="loginBtn">Sign in</button>
      </div>

      <div class="sidebar-box" style="margin-top:22px;">
       <strong>No local server needed</strong>
       <div class="small">All data is embedded directly in the HTML so it can run cleanly on a shared or public PC.</div>
      </div>
     </div>
    </div>
   `;

   document.getElementById("loginBtn").addEventListener("click", () => {
    login(document.getElementById("loginUserSelect").value);
   });
  }

  function renderApp() {
   const loginShell = document.getElementById("loginShell");
   const appShell = document.getElementById("appShell");
   loginShell.classList.add("hidden");
   appShell.classList.remove("hidden");

   const user = getCurrentUser();
   const club = getCurrentClub();
   const pendingApprovals = getPendingApprovalsForUser().length;
   const myPending = club ? getClubPendingMatches(club.id).length : 0;

   appShell.innerHTML = `
    <aside class="sidebar">
     <div class="brand">
      Manager Mode EAFC
      <small>Centralised career mode, with club-level visibility and separate administration.</small>
     </div>

     <div class="user-pill">
      <strong>${escapeHtml(user.name)}</strong>
      <div class="small" style="margin-top:6px;">Role: ${user.role === "admin" ? "Administrator" : "Manager"}</div>
      <div class="small" style="margin-top:4px;">Club: ${club ? escapeHtml(club.name) : "General administration"}</div>
     </div>

     <nav class="nav">
      <button class="nav-btn ${state.currentTab === "meu-clube" ? "active" : ""}" data-tab="meu-clube">My Club</button>
      <button class="nav-btn ${state.currentTab === "partidas" ? "active" : ""}" data-tab="partidas">Fixtures</button>
      <button class="nav-btn ${state.currentTab === "liga" ? "active" : ""}" data-tab="liga">League</button>
      <button class="nav-btn ${state.currentTab === "historico" ? "active" : ""}" data-tab="historico">History</button>
      <button class="nav-btn ${state.currentTab === "aprovacoes" ? "active" : ""}" data-tab="aprovacoes">Approvals ${pendingApprovals ? `(${pendingApprovals})` : ""}</button>
      ${isAdmin() ? `<button class="nav-btn ${state.currentTab === "administracao" ? "active" : ""}" data-tab="administracao">Administration</button>` : ""}
     </nav>

     <div class="sidebar-box">
      <h4>Quick summary</h4>
      <div class="small">Awaiting approval: ${pendingApprovals}</div>
      <div class="small">Pending results for your club: ${myPending}</div>
      <div class="small">Season: ${escapeHtml(state.league.season)}</div>
      <div class="small">League: ${escapeHtml(state.league.name)}</div>
     </div>

     <div class="sidebar-box">
      <h4>Actions</h4>
      <div class="actions" style="margin-top:12px;">
       <button class="btn" id="sidebarLogoutBtn">Sign out</button>
      </div>
     </div>
    </aside>

    <main class="main">
     ${renderTopBar()}
     ${renderMeuClubTab()}
     ${renderMatchesTab()}
     ${renderLeagueTab()}
     ${renderHistoricoTab()}
     ${renderAprovacoesTab()}
     ${isAdmin() ? renderAdminTab() : ""}
    </main>
   `;

   attachAppEvents();
  }

  function renderTopBar() {
   const user = getCurrentUser();
   const club = getCurrentClub();

  function renderMatchForm(match) {

   const locked = !canSubmit || match.status === "approved";

   return `
    <div>
     <div class="list-item" style="margin-bottom:16px;">
      <strong>${escapeHtml(home.name)} v ${escapeHtml(away.name)}</strong>
      <div class="small" style="margin-top:6px;">Round ${match.round} • ${escapeHtml(match.date)}</div>
      <div class="small" style="margin-top:4px;">Current status: ${match.status === "approved" ? "Approved" : match.status === "pending" ? "Pending approval" : "Scheduled"}</div>
     </div>

     ${
      locked && match.status === "approved"
       ? `<div class="empty" style="margin-bottom:16px;">This fixture has already been approved and is locked for direct editing.</div>`
       : !canSubmit
        ? `<div class="empty" style="margin-bottom:16px;">You do not have permission to submit the result for this fixture.</div>`
        : ""
     }

     <div class="form-grid">
      <div>
       <label for="matchHomeGoals">Goals ${escapeHtml(home.name)}</label>
       <input id="matchHomeGoals" type="number" min="0" value="${match.homeGoals === "" ? "" : match.homeGoals}" ${locked ? "disabled" : ""} />

      <div>
       <label for="matchAwayGoals">Goals ${escapeHtml(away.name)}</label>
       <input id="matchAwayGoals" type="number" min="0" value="${match.awayGoals === "" ? "" : match.awayGoals}" ${locked ? "disabled" : ""} />

     ${renderGoalRows(match, "home")}

     ${renderCardRows(match, "home", "yellow", "Yellow cards")}
     ${renderCardRows(match, "away", "yellow", "Yellow cards")}

     ${renderCardRows(match, "away", "red", "Red cards")}

      <div>
       <label for="matchEvidenceFile">Evidence image</label>
       <input id="matchEvidenceFile" type="file" accept="image/*" ${locked ? "disabled" : ""} />
       <div class="small" style="margin-top:8px;">The image is stored in this browser on this device, with no external link required.</div>
       ${renderEvidencePreview(match)}
      </div>
      <div>
       <label for="matchDateInput">Date</label>
       <input id="matchDateInput" type="date" value="${escapeHtml(match.date || "")}" ${locked ? "disabled" : ""} />
      </div>
     </div>

     <div style="margin-top:16px;">
      <label for="matchNotes">Notes</label>
      <textarea id="matchNotes" ${locked ? "disabled" : ""}>${escapeHtml(match.notes || "")}</textarea>
     </div>

     <div class="actions" style="margin-top:16px;">
      ${!locked ? `<button class="btn success" id="saveMatchBtn" data-match-id="${match.id}">Submit for approval</button>` : ""}
      ${!locked ? `<button class="btn warning" id="saveDraftBtn" data-match-id="${match.id}">Guardar rascunho</button>` : ""}
     </div>

     <div class="section-divider"></div>
     <h3>Audit trail</h3>
     ${
      match.audit.length ? `
       <div class="list">
        ${match.audit.map(item => `
         <div class="list-item">
          <strong>${escapeHtml(item.by)}</strong>
          <div class="small" style="margin-top:4px;">${escapeHtml(item.at)}</div>
          <div class="small" style="margin-top:8px;color:var(--text);">${escapeHtml(item.action)}</div>
         </div>
        `).join("")}
       </div>
      ` : `<div class="empty">No audit records yet.</div>`
     }
    </div>
   `;
  }

  function renderMatchesTab() {
   const club = getCurrentClub();
   const unlockedRounds = getUnlockedRoundCount();
   const nextReleaseDate = getNextReleaseDate();
   const availableMatches = isAdmin()
    ? state.matches.filter(match => isMatchUnlocked(match))
    : state.matches.filter(match => club && (match.homeClubId === club.id || match.awayClubId === club.id) && isMatchUnlocked(match));

   const visibleMatches = [...availableMatches].sort((a, b) => {
    if (Number(a.round) !== Number(b.round)) return Number(a.round) - Number(b.round);
    return String(a.date).localeCompare(String(b.date));
   });

   const selectedMatch = state.selectedMatchId ? getMatchById(state.selectedMatchId) : null;
   const formMatch = selectedMatch && isMatchUnlocked(selectedMatch) && (isAdmin() || (club && (selectedMatch.homeClubId === club.id || selectedMatch.awayClubId === club.id)))
    ? selectedMatch
    : null;

   const releaseMessage = nextReleaseDate
    ? `Rounds 1-${unlockedRounds} are currently open. The next three rounds will open on ${escapeHtml(formatReleaseDate(nextReleaseDate))}.`
    : 'All 18 rounds are now open.';

   return `
    <section class="tab ${state.currentTab === "partidas" ? "active" : ""}">

     <div class="page-header">
      <div>

       ${
        visibleMatches.length ? `
         <div class="list">
          ${visibleMatches.map(match => {
           const home = getClubById(match.homeClubId);
           const away = getClubById(match.awayClubId);

           const label = match.status === "approved" ? "Approved" : match.status === "pending" ? "Pending" : "Scheduled";
           return `
            <div class="list-item">
             <strong>${escapeHtml(home.name)} v ${escapeHtml(away.name)}</strong>${score}
             <br>
             <span class="small">Round ${match.round} • ${escapeHtml(match.date)}</span>
             <div style="margin-top:10px;"><span class="pill ${pillClass}">${label}</span></div>
             <div class="actions" style="margin-top:12px;">
              ${(isAdmin() || canSubmitMatch(match.homeClubId, match.awayClubId)) ? `<button class="btn quick-open-match" data-match-id="${match.id}">Open</button>` : ""}

            </div>

         </div>
        ` : `<div class="empty">There are no open fixtures available for this user right now.</div>`
       }
      </div>
     </div>
    </section>

               const awayR = match.events.filter(e => e.teamSide === "away" && e.type === "red").length;
               const cardsLabel = `${home.name}: ${homeY} CA / ${homeR} CV • ${away.name}: ${awayY} CA / ${awayR} CV`;
               const statusLabel = match.status === "approved" ? "Approved" : match.status === "pending" ? "Pending" : "Scheduled";
               return `
                <tr>
                 <td>${renderClubCell(home.name, getClubLogoUrl(home))} <span class="small">vs</span> ${renderClubCell(away.name, getClubLogoUrl(away))}</td>
                 <td>${result}</td>
                 <td>${statusLabel}</td>
                 <td>${escapeHtml(cardsLabel)}</td>
                 <td>${escapeHtml(match.date)}</td>
                </tr>
               `;
              }).join("")}
             </tbody>
            </table>
           </div>
          </div>
         `).join("")}
        </div>
       ` : `<div class="empty">There are no recorded fixtures in the league yet.</div>`
      }
     </div>
    </section>
   `;
  }

  function renderHistoricoTab() {
   const club = getCurrentClub();
   const matches = isAdmin()
    ? [...state.matches].sort((a, b) => String(b.date).localeCompare(String(a.date)))
    : club
     ? getClubAllMatches(club.id).sort((a, b) => String(b.date).localeCompare(String(a.date)))
     : [];

   return `
    <section class="tab ${state.currentTab === "historico" ? "active" : ""}">
     <div class="breadcrumbs">Home > History</div>
     <div class="page-header">
      <div>
       <h2>History completo</h2>
       <p class="muted">Review fixtures, evidence, status and recorded details.</p>
      </div>
     </div>

     <div class="card">
      ${
       matches.length ? `
        <div class="list">
         ${matches.map(match => {
          const home = getClubById(match.homeClubId);
          const away = getClubById(match.awayClubId);
          const score = match.homeGoals !== "" && match.awayGoals !== "" ? `${match.homeGoals}–${match.awayGoals}` : "No result";
          const label = match.status === "approved" ? "Approved" : match.status === "pending" ? "Pending" : "Scheduled";
          const cls = match.status === "approved" ? "approved" : match.status === "pending" ? "pending" : "";
          return `
           <div class="list-item">
            <div class="card-row">
             <div>
              <strong>${escapeHtml(home.name)} v ${escapeHtml(away.name)}</strong>
              <div class="small" style="margin-top:6px;">Round ${match.round} • ${escapeHtml(match.date)}</div>
             </div>
             <div><span class="pill ${cls}">${label}</span></div>
            </div>

            <div style="margin-top:12px;font-size:1.1rem;font-weight:700;">${escapeHtml(score)}</div>
            <div class="small" style="margin-top:10px;line-height:1.7;">${match.notes ? escapeHtml(match.notes) : "No notes added."}</div>

            ${renderEvidencePreview(match)}

            <div class="actions" style="margin-top:14px;">
             <button class="btn quick-open-match" data-match-id="${match.id}">Open detalhes</button>
            </div>
           </div>
          `;
         }).join("")}
        </div>
       ` : `<div class="empty">There is no history available yet.</div>`
      }
     </div>
    </section>
   `;
  }

  function renderAprovacoesTab() {
   const approvals = getPendingApprovalsForUser();

   return `
    <section class="tab ${state.currentTab === "aprovacoes" ? "active" : ""}">
     <div class="breadcrumbs">Home > Approvals</div>
     <div class="page-header">
      <div>
       <h2>Approvals pendentes</h2>
       <p class="muted">Review results submitted by other managers.</p>
      </div>
     </div>

     <div class="card">
      ${
       approvals.length ? `
        <div class="list">
         ${approvals.map(match => {
          const home = getClubById(match.homeClubId);
          const away = getClubById(match.awayClubId);
          return `
           <div class="list-item">
            <strong>${escapeHtml(home.name)} ${match.homeGoals}–${match.awayGoals} ${escapeHtml(away.name)}</strong>
            <div class="small" style="margin-top:6px;">Round ${match.round} • ${escapeHtml(match.date)}</div>
            <div class="small" style="margin-top:8px;color:var(--text);">${escapeHtml(match.notes || "No notes added.")}</div>
            ${renderEvidencePreview(match)}
            <div class="actions" style="margin-top:14px;">
             <button class="btn success approve-match" data-match-id="${match.id}">Approve</button>
             <button class="btn danger reject-match" data-match-id="${match.id}">Reject</button>
             <button class="btn quick-open-match" data-match-id="${match.id}">Open</button>
            </div>
           </div>
          `;
         }).join("")}
        </div>
       ` : `<div class="empty">There are no pending approvals for this user.</div>`
      }
     </div>
    </section>
   `;
  }

  function renderAdminTab() {
   const table = buildLeagueTable();
   return `
    <section class="tab ${state.currentTab === "administracao" ? "active" : ""}">
     <div class="breadcrumbs">Home > Administration</div>
     <div class="page-header">
      <div>
       <h2>Administration</h2>
       <p class="muted">League-wide overview of clubs, users and fixtures.</p>
      </div>
     </div>

     <div class="grid grid-4">
      <div class="card"><h3>Clubs</h3><strong>${state.clubs.length}</strong></div>
      <div class="card"><h3>Global players</h3><strong>${state.players.length}</strong></div>
      <div class="card"><h3>Matches</h3><strong>${state.matches.length}</strong></div>
      <div class="card"><h3>Managers</h3><strong>${state.users.filter(u => u.role === "manager").length}</strong></div>
     </div>

     <div class="card" style="margin-top:18px;">
      <h3>Full table</h3>
      <div class="table-wrap">
       <table>
        <thead><tr><th>Pos</th><th>Club</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GM</th><th>GS</th><th>SG</th></tr></thead>
        <tbody>
         ${table.map(row => `
          <tr>
           <td>${row.position}</td>
           <td>${renderClubCell(row.clubName, getClubLogoUrl(getClubById(row.clubId)))}</td>
           <td>${row.points}</td>
           <td>${row.played}</td>
           <td>${row.wins}</td>
           <td>${row.draws}</td>
           <td>${row.losses}</td>
           <td>${row.gf}</td>
           <td>${row.ga}</td>
           <td>${row.gd}</td>
          </tr>
         `).join("")}
        </tbody>
       </table>
      </div>
     </div>
    </section>
   `;
  }

  function attachAppEvents() {
   document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
   });

   const logoutBtn = document.getElementById("sidebarLogoutBtn");
   if (logoutBtn) logoutBtn.addEventListener("click", logout);

   const matchSelect = document.getElementById("matchSelect");
   if (matchSelect) {
    matchSelect.addEventListener("change", (e) => {
     state.selectedMatchId = e.target.value ? Number(e.target.value) : null;
     saveUiState();
     render();
    });
   }

   document.querySelectorAll(".quick-open-match").forEach(btn => {
    btn.addEventListener("click", () => openMatch(btn.dataset.matchId));
   });

   document.querySelectorAll(".approve-match").forEach(btn => {
    btn.addEventListener("click", () => approveMatch(Number(btn.dataset.matchId)));
   });

   document.querySelectorAll(".reject-match").forEach(btn => {
    btn.addEventListener("click", () => rejectMatch(Number(btn.dataset.matchId)));
   });

   const evidenceFileInput = document.getElementById("matchEvidenceFile");
   if (evidenceFileInput) {
    evidenceFileInput.addEventListener("change", () => {
     const file = evidenceFileInput.files?.[0];
     if (!file) {
      delete evidenceFileInput.dataset.imageDate;
      return;
     }
     const reader = new FileReader();
     reader.onload = () => {
      evidenceFileInput.dataset.imageDate = typeof reader.result === "string" ? reader.result : "";
      const match = state.selectedMatchId ? getMatchById(state.selectedMatchId) : null;
      if (match && evidenceFileInput.dataset.imageDate) {
       match.evidenceImage = evidenceFileInput.dataset.imageDate;
       saveAllToLocalSnapshot();
       render();
       toast("Evidence image carregada.");
      }
     };
     reader.readAsDateURL(file);
    });
   }

   const saveMatchBtn = document.getElementById("saveMatchBtn");
   if (saveMatchBtn) {
    saveMatchBtn.addEventListener("click", () => saveMatch(Number(saveMatchBtn.dataset.matchId), "pending"));
   }

   const saveDraftBtn = document.getElementById("saveDraftBtn");
   if (saveDraftBtn) {
    saveDraftBtn.addEventListener("click", () => saveMatch(Number(saveDraftBtn.dataset.matchId), "scheduled"));
   }

   document.querySelectorAll(".add-card-row").forEach(btn => {
    btn.addEventListener("click", () => {
     const match = getMatchById(state.selectedMatchId);
     if (!match) return;
     match.events.push({
      teamSide: btn.dataset.team,
      type: btn.dataset.type,
      player: "",
      assist: ""
     });
     render();
    });
   });

   document.querySelectorAll(".remove-card-row").forEach(btn => {
    btn.addEventListener("click", () => {
     const match = getMatchById(state.selectedMatchId);
     if (!match) return;
     const filtered = [];
     let currentIndex = 0;
     match.events.forEach(e => {
      if (e.teamSide === btn.dataset.team && e.type === btn.dataset.type) {
       if (currentIndex !== Number(btn.dataset.index)) filtered.push(e);
       currentIndex++;
      } else {
       filtered.push(e);
      }
     });
     match.events = filtered;
     render();
    });
   });

   setTimeout(() => {
    const match = state.selectedMatchId ? getMatchById(state.selectedMatchId) : null;
    if (!match) return;

    const goalEvents = match.events.filter(e => e.type === "goal");
    goalEvents.forEach((event, i) => {
     const teamEvents = goalEvents.filter(x => x.teamSide === event.teamSide);
     const index = teamEvents.findIndex((x, idx) => idx >= 0 &&–=== event);
     const playerEl = document.querySelector(`[data-kind="goal-player"][data-team="${event.teamSide}"][data-index="${index}"]`);
     const assistEl = document.querySelector(`[data-kind="goal-assist"][data-team="${event.teamSide}"][data-index="${index}"]`);
     if (playerEl) playerEl.value = event.player || "";
     if (assistEl) assistEl.value = event.assist || "";
    });

    ["home", "away"].forEach(team => {
     ["yellow", "red"].forEach(type => {
      const events = match.events.filter(e => e.teamSide === team && e.type === type);
      events.forEach((event, index) => {
       const el = document.querySelector(`.card-player[data-team="${team}"][data-type="${type}"][data-index="${index}"]`);
       if (el) el.value = event.player || "";
      });
     });
    });
   }, 0);
  }

  function collectFormEvents(match) {
   const events = [];

   const homeGoals = Number(document.getElementById("matchHomeGoals")?.value || 0);
   const awayGoals = Number(document.getElementById("matchAwayGoals")?.value || 0);

   for (let i = 0; i < homeGoals; i++) {
    const player = document.querySelector(`[data-kind="goal-player"][data-team="home"][data-index="${i}"]`)?.value || "";
    const assist = document.querySelector(`[data-kind="goal-assist"][data-team="home"][data-index="${i}"]`)?.value || "";
    if (player) events.push({ teamSide: "home", type: "goal", player, assist });
   }

   for (let i = 0; i < awayGoals; i++) {
    const player = document.querySelector(`[data-kind="goal-player"][data-team="away"][data-index="${i}"]`)?.value || "";
    const assist = document.querySelector(`[data-kind="goal-assist"][data-team="away"][data-index="${i}"]`)?.value || "";
    if (player) events.push({ teamSide: "away", type: "goal", player, assist });
   }

   document.querySelectorAll(".card-player").forEach(el => {
    if (el.value) {
     events.push({
      teamSide: el.dataset.team,
      type: el.dataset.type,
      player: el.value,
      assist: ""
     });
    }
   });

   return events;
  }

  function saveMatch(matchId, targetStatus) {
   const match = getMatchById(matchId);
   const user = getCurrentUser();
   if (!match || !user) return;

   match.homeGoals = Number(document.getElementById("matchHomeGoals")?.value || 0);
   match.awayGoals = Number(document.getElementById("matchAwayGoals")?.value || 0);
   match.date = document.getElementById("matchDateInput")?.value || match.date;
   const evidenceFileInput = document.getElementById("matchEvidenceFile");
   if (evidenceFileInput?.dataset.imageDate) match.evidenceImage = evidenceFileInput.dataset.imageDate;
   match.notes = document.getElementById("matchNotes")?.value || "";
   match.events = collectFormEvents(match);

   if (targetStatus === "pending") {
    match.status = "pending";
    match.submittedByUserId = user.id;
    match.approvedByUserId = null;
    match.audit.push({
     at: nowStamp(),
     by: user.name,
     action: "Result submitted for approval"
    });
    toast("Result submitted for approval.");
   } else {
    match.status = "scheduled";
    match.audit.push({
     at: nowStamp(),
     by: user.name,
     action: "Draft saved"
    });
    toast("Draft saved.", "warning");
   }

   saveAllToLocalSnapshot();
   render();
  }

  function approveMatch(matchId) {
   const match = getMatchById(matchId);
   const user = getCurrentUser();
   if (!match || !user || !canApproveMatch(match)) return;

   match.status = "approved";
   match.approvedByUserId = user.id;
   match.audit.push({
    at: nowStamp(),
    by: user.name,
    action: "Result approved"
   });

   saveAllToLocalSnapshot();
   render();
   toast("Match approved successfully.");
  }

  function rejectMatch(matchId) {
   const match = getMatchById(matchId);
   const user = getCurrentUser();
   if (!match || !user || !canApproveMatch(match)) return;

   match.status = "scheduled";
   match.approvedByUserId = null;
   match.audit.push({
    at: nowStamp(),
    by: user.name,
    action: "Result rejected and returned for editing"
   });

   saveAllToLocalSnapshot();
   render();
   toast("Fixture rejeitada e devolvida.", "danger");
  }

  window.addEventListener("DOMContentLoaded", init);
 </script>

</body>
</html>
